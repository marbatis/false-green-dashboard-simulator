name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: ruff check .
      - run: pytest -q

  smoke:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Start app
        run: |
          streamlit run app/ui/streamlit_app.py --server.address=127.0.0.1 --server.port=8501 --server.headless=true > /tmp/app.log 2>&1 &
          for i in {1..50}; do
            if curl -fsS http://127.0.0.1:8501/ > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8501/ > /dev/null
      - name: Smoke checks
        run: |
          curl -fsS http://127.0.0.1:8501/ > /dev/null
          curl -fsS "http://127.0.0.1:8501/?scenario=retry_storm_masked_by_averages" > /dev/null
      - name: Logs on failure
        if: failure()
        run: cat /tmp/app.log
